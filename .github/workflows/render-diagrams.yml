name: Render PlantUML diagrams

on:
  push:
    branches: [main, develop, "feature/**"]
    paths:
      - "docs/diagrams/**/*.puml"
  workflow_dispatch:

jobs:
  render:
    name: Generate SVGs from .puml sources
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download PlantUML jar
        run: |
          curl -sL https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar \
               -o /tmp/plantuml.jar

      - name: Generate SVG diagrams
        run: |
          find docs/diagrams -name "*.puml" | while read f; do
            java -jar /tmp/plantuml.jar -tsvg "$f"
            echo "Rendered: $f"
          done

      - name: Commit generated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/**/*.svg
          if git diff --staged --quiet; then
            echo "No diagram changes — nothing to commit."
          else
            git commit -m "chore: regenerate PlantUML SVGs [skip ci]"
            git push
          fi
